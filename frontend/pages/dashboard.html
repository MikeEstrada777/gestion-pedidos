<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

<!-- BARRA LATERAL -->
<div class="d-flex">
    <div class="sidebar p-3" style="width: 220px;">
        <h5 class="text-white text-center mb-4">🛒 Pedidos</h5>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="productos.html">📦 Productos</a>
        <a href="pedidos.html">🧾 Pedidos</a>
        <hr style="border-color: white;">
        <a href="#" onclick="cerrarSesion()">🚪 Cerrar sesión</a>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="flex-grow-1 p-4">
        <h2>Bienvenido, <span id="nombre_usuario"></span> 👋</h2>
        <p class="text-muted">Panel principal del sistema de gestión de pedidos</p>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card shadow text-center p-3">
                    <h1>📦</h1>
                    <h5>Productos</h5>
                    <p class="text-muted">Gestiona el catálogo</p>
                    <a href="productos.html" class="btn btn-primary">Ver productos</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow text-center p-3">
                    <h1>🧾</h1>
                    <h5>Pedidos</h5>
                    <p class="text-muted">Gestiona los pedidos</p>
                    <a href="pedidos.html" class="btn btn-primary">Ver pedidos</a>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow text-center p-3">
                    <h1>👥</h1>
                    <h5>Clientes</h5>
                    <p class="text-muted">Ver usuarios registrados</p>
                    <a href="#" class="btn btn-primary">Ver clientes</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Verificar que hay sesión activa
    const usuario = JSON.parse(localStorage.getItem("usuario"));
    if (!usuario) {
        window.location.href = "login.html";
    } else {
        document.getElementById("nombre_usuario").textContent = usuario.nombre;
    }

    function cerrarSesion() {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
    }
</script>
</body>
</html>
