<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4" style="background-color: #4e73df;">
    <span class="navbar-brand fw-bold">🛒 Gestión de Pedidos</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" id="nombre_cliente"></span>
        <a href="tienda.html" class="btn btn-outline-light btn-sm">
            🛍️ Seguir comprando
        </a>
        <button onclick="cerrarSesion()" class="btn btn-danger btn-sm">
            🚪 Salir
        </button>
    </div>
</nav>

<div class="container mt-4">
    <h4>📦 Mis Pedidos</h4>
    <p class="text-muted">Aquí puedes ver el estado de todos tus pedidos</p>

<div class="card shadow">
        <div class="card-body">
            <div class="table-responsive-wrapper"><table class="table table-hover mt-2">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Dirección</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tabla_mis_pedidos">
                    <tr>
                        <td colspan="5" class="text-center">
                            Cargando pedidos...
                        </td>
                    </tr>
                </tbody>
            </table></div>
        </div>
    </div>
</div>

<script src="../js/toasts.js"></script>
<script src="../js/mis_pedidos.js"></script>
</body>
</html>
