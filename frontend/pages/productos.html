<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

<!-- HAMBURGUESA MÓVIL -->
<button class="btn-hamburguesa d-md-none" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">
    <!-- BARRA LATERAL -->
    <div class="sidebar p-3" style="width: 220px;">
        <h5 class="text-white text-center mb-4">🛒 Pedidos</h5>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="productos.html">📦 Productos</a>
        <a href="pedidos.html">🧾 Pedidos</a>
        <hr style="border-color: white;">
        <a href="#" onclick="cerrarSesion()">🚪 Cerrar sesión</a>
    </div>

    <!-- CONTENIDO -->
    <div class="flex-grow-1 p-4">
        <h2>📦 Productos</h2>
        <p class="text-muted">Gestiona el catálogo de productos</p>

        <!-- FORMULARIO AGREGAR -->
        <div class="card shadow mb-4">
            <div class="card-body">
                <h5>Agregar producto</h5>
                <div class="row g-2">
                    <div class="col-md-3">
                        <input type="text" id="nombre" class="form-control" 
                               placeholder="Nombre del producto">
                    </div>
                    <div class="col-md-3">
                        <input type="text" id="descripcion" class="form-control" 
                               placeholder="Descripción">
                    </div>
                    <div class="col-md-2">
                        <input type="number" id="precio" class="form-control" 
                               placeholder="Precio">
                    </div>
                    <div class="col-md-2">
                        <input type="number" id="stock" class="form-control" 
                               placeholder="Stock">
                    </div>
                    <div class="col-md-2">
                        <button onclick="crearProducto()" 
                                class="btn btn-primary w-100">
                            Agregar
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- TABLA DE PRODUCTOS -->
        <div class="card shadow">
            <div class="card-body">
                <h5>Lista de productos</h5>
                <div class="table-responsive-wrapper"><table class="table table-hover mt-3">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_productos">
                        <tr>
                            <td colspan="6" class="text-center">
                                Cargando productos...
                            </td>
                        </tr>
                    </tbody>
                </table></div>
            </div>
        </div>
    </div>
</div>

<script src="../js/toasts.js"></script>
<script src="../js/productos.js"></script>
<script>
function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("abierta");
    document.querySelector(".sidebar-overlay").classList.toggle("activo");
}
</script>
</body>
</html>
