<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #fff;
            overflow: hidden;
        }

        .left-panel {
            width: 55%;
            background: linear-gradient(135deg, #f64f59 0%, #c471ed 50%, #12c2e9 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
        }

        .left-panel::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            bottom: -80px;
            right: -80px;
            animation: float 8s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .left-panel .icon-big {
            font-size: 5rem;
            animation: bounce 2s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .left-panel h1 {
            color: white;
            font-weight: 700;
            font-size: 2.2rem;
            text-align: center;
            z-index: 1;
            margin-top: 20px;
        }

        .left-panel p {
            color: rgba(255,255,255,0.85);
            text-align: center;
            font-size: 1rem;
            z-index: 1;
            margin-top: 10px;
            line-height: 1.6;
        }

        .steps {
            margin-top: 40px;
            z-index: 1;
            width: 100%;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 16px;
            color: white;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.1);
            padding: 14px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .step-number {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-item p {
            margin: 0;
            font-size: 0.9rem;
            color: white;
            text-align: left;
        }

        .right-panel {
            width: 45%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 50px;
        }

        .register-box {
            width: 100%;
            max-width: 380px;
        }

        .register-box h2 {
            font-weight: 700;
            color: #1a1a2e;
            font-size: 1.8rem;
        }

        .register-box p.subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 500;
            color: #444;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }

        .form-control {
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .form-control:focus {
            border-color: #c471ed;
            box-shadow: 0 0 0 4px rgba(196,113,237,0.12);
            background: white;
        }

        .btn-register {
            background: linear-gradient(135deg, #f64f59, #c471ed);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(196,113,237,0.45);
        }

        .divider {
            text-align: center;
            color: #bbb;
            font-size: 0.85rem;
            margin: 20px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #eee;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .login-link {
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .login-link a {
            color: #c471ed;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover { text-decoration: underline; }

        .alert {
            border-radius: 12px;
            border: none;
            font-size: 0.85rem;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .input-group-icon {
            position: relative;
        }

        .input-group-icon .icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
        }
    </style>
</head>
<body>

<!-- LADO IZQUIERDO -->

        </div>

</div>
