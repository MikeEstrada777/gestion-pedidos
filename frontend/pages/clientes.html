<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../css/estilos.css" rel="stylesheet">
</head>
<body>

<!-- HAMBURGUESA MÓVIL -->
<button class="btn-hamburguesa d-md-none" onclick="toggleSidebar()">☰</button>
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>

<div class="d-flex">
    <div class="sidebar p-3" style="width: 220px;">
        <h5 class="text-white text-center mb-4">🛒 Pedidos</h5>
        <a href="dashboard.html">📊 Dashboard</a>
        <a href="productos.html">📦 Productos</a>
        <a href="pedidos.html">🧾 Pedidos</a>
        <a href="clientes.html">👥 Clientes</a>
        <hr style="border-color: white;">
        <a href="#" onclick="cerrarSesion()">🚪 Cerrar sesión</a>
    </div>

    <div class="flex-grow-1 p-4">
        <h2>👥 Clientes</h2>
        <p class="text-muted">Usuarios registrados en el sistema</p>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive-wrapper"><table class="table table-hover mt-2">
                    <thead class="table-dark">
                        <tr>
                            <th>#</th>
                            <th>Nombre</th>
                            <th>Correo</th>
                            <th>Rol</th>
                            <th>Fecha registro</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_clientes">
                        <tr>
                            <td colspan="5" class="text-center">
                                Cargando clientes...
                            </td>
                        </tr>
                    </tbody>
                </table></div>
            </div>
        </div>
    </div>
</div>

<script>
const API = "http://localhost/gestion_pedidos/backend/api";

const usuario = JSON.parse(localStorage.getItem("usuario"));
if (!usuario) window.location.href = "login.html";
if (usuario.rol !== "admin") window.location.href = "tienda.html";

function cerrarSesion() {
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
}

document.addEventListener("DOMContentLoaded", () => {
    fetch(`${API}/usuarios.php?accion=listar`)
    .then(res => res.json())
    .then(usuarios => {
        const tabla = document.getElementById("tabla_clientes");
        if (usuarios.length === 0) {
            tabla.innerHTML = `<tr>
                <td colspan="5" class="text-center">No hay usuarios</td>
            </tr>`;
            return;
        }
        tabla.innerHTML = usuarios.map(u => `
            <tr>
                <td>${u.id_usuario}</td>
                <td>${u.nombre}</td>
                <td>${u.correo}</td>
                <td>
                    <span class="badge ${u.rol === 'admin' ? 'bg-danger' : 'bg-primary'}">
                        ${u.rol}
                    </span>
                </td>
                <td>${new Date(u.fecha_registro).toLocaleDateString()}</td>
            </tr>
        `).join("");
    });
});
</script>
<script>
function toggleSidebar() {
    document.querySelector(".sidebar").classList.toggle("abierta");
    document.querySelector(".sidebar-overlay").classList.toggle("activo");
}
</script>
</body>
</html>
