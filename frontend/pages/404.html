<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página no encontrada | Pedidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fondo animado con burbujas */
        .bg-bubbles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(102,126,234,0.15), rgba(118,75,162,0.1));
            animation: flotar 8s ease-in-out infinite;
        }

        .bubble:nth-child(1)  { width: 80px;  height: 80px;  top: 10%;  left: 5%;   animation-delay: 0s;   animation-duration: 7s; }
        .bubble:nth-child(2)  { width: 120px; height: 120px; top: 70%;  left: 10%;  animation-delay: 1s;   animation-duration: 9s; }
        .bubble:nth-child(3)  { width: 60px;  height: 60px;  top: 30%;  left: 85%;  animation-delay: 2s;   animation-duration: 6s; }
        .bubble:nth-child(4)  { width: 150px; height: 150px; top: 80%;  left: 80%;  animation-delay: 0.5s; animation-duration: 10s; }
        .bubble:nth-child(5)  { width: 40px;  height: 40px;  top: 50%;  left: 50%;  animation-delay: 3s;   animation-duration: 5s; }
        .bubble:nth-child(6)  { width: 100px; height: 100px; top: 5%;   left: 60%;  animation-delay: 1.5s; animation-duration: 8s; }

        @keyframes flotar {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33%       { transform: translateY(-20px) rotate(5deg); }
            66%       { transform: translateY(10px) rotate(-3deg); }
        }

        /* Contenedor principal */
        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 48px 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(102,126,234,0.15);
            max-width: 520px;
            width: 90%;
            animation: aparecer 0.6s ease forwards;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Número 404 grande */
        .numero-404 {
            font-size: 7rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulso 2s ease-in-out infinite;
            margin-bottom: 8px;
        }

        @keyframes pulso {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.04); }
        }

        /* Emoji flotante */
        .emoji-float {
            font-size: 3.5rem;
            display: block;
            margin-bottom: 16px;
            animation: emojiFlot 3s ease-in-out infinite;
        }

        @keyframes emojiFlot {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .titulo-error {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 10px;
        }

        .descripcion-error {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        /* Botones */
        .btn-volver {
            background: linear-gradient(90deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            padding: 12px 32px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102,126,234,0.35);
        }

        .btn-volver:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102,126,234,0.5);
            color: white;
        }

        .btn-inicio {
            border: 2px solid #667eea;
            border-radius: 12px;
            padding: 11px 28px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.95rem;
            color: #667eea;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn-inicio:hover {
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        /* Divider decorativo */
        .divider {
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            margin: 20px auto;
        }

        /* Badge de branding */
        .brand-badge {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 20px;
            white-space: nowrap;
        }

        /* Contador regreso */
        .contador-texto {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 20px;
        }

        .contador-texto span {
            color: #667eea;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .numero-404 { font-size: 5rem; }
            .error-container { padding: 48px 24px 32px; }
            .btn-volver, .btn-inicio { display: block; width: 100%; text-align: center; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <!-- Burbujas de fondo -->
    <div class="bg-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Contenedor de error -->
    <div class="error-container">

        <div class="brand-badge">🛒 Gestión de Pedidos</div>

        <span class="emoji-float" style="margin-top: 20px;">🔍</span>
        <div class="numero-404">404</div>
        <div class="divider"></div>

        <h1 class="titulo-error">¡Página no encontrada!</h1>
        <p class="descripcion-error">
            La página que buscas no existe o fue movida.<br>
            Verifica la URL o regresa al inicio.
        </p>

        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="javascript:history.back()" class="btn-inicio">
                ← Volver atrás
            </a>
            <a href="login.html" id="btn-inicio" class="btn-volver">
                🏠 Ir al inicio
            </a>
        </div>

        <p class="contador-texto">
            Redirigiendo en <span id="contador">10</span> segundos...
        </p>

    </div>

    <script>
        // Redirigir al inicio según rol del usuario
        const usuario = JSON.parse(localStorage.getItem("usuario"));
        const inicio = usuario
            ? (usuario.rol === "admin" ? "dashboard.html" : "tienda.html")
            : "login.html";

        document.getElementById("btn-inicio").href = inicio;

        // Contador regresivo
        let segundos = 10;
        const contadorEl = document.getElementById("contador");

        const intervalo = setInterval(() => {
            segundos--;
            contadorEl.textContent = segundos;
            if (segundos <= 0) {
                clearInterval(intervalo);
                window.location.href = inicio;
            }
        }, 1000);
    </script>

</body>
</html>
